# Auto-release workflow: triggered when a release PR from pan-os-codegen
# is merged. Creates the version tag, runs GoReleaser to build binaries,
# and attaches release notes.
#
# Prerequisites:
#   - Repository secrets: GPG_PRIVATE_KEY, PASSPHRASE (already configured)

name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    name: Tag & Release
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'auto-release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#auto-release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@01dd5d3ca463c7f10f7f4f7b4f177225ac661ee4 # v6.1.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: latest
          args: release --clean --parallelism 2
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release notes from PR body
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body -q '.body' | \
            sed -n '/<!-- RELEASE_NOTES_START -->/,/<!-- RELEASE_NOTES_END -->/p' | \
            sed '1d;$d' > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::warning::No release notes found in PR body"
            echo "## Release ${{ steps.version.outputs.version }}" > release-notes.md
          fi

      - name: Attach release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release edit "$VERSION" --notes-file release-notes.md
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "- Version: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- Release: https://github.com/PaloAltoNetworks/terraform-provider-panos/releases/tag/$VERSION" >> $GITHUB_STEP_SUMMARY
